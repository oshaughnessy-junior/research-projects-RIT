name: RIFT CI

on:
  push:
    branches: [ "rift_O4d_junior" ]
  pull_request:
    branches: [ "rift_O4d_junior" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest

    - name: Run Tests
      run: |
        # Run tests in the MonteCarloMarginalizeCode/Code/test directory
        pytest MonteCarloMarginalizeCode/Code/test
