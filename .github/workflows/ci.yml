name: CI

on:
  push:
    branches: [rift_O4d_junior]
  pull_request:
    branches: [rift_O4d_junior]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  help-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Enable symlink
        run: sudo ln -sf $(which python3) /usr/bin/python
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --break-system-packages
          python -m pip install -r requirements.txt --break-system-packages
          python -m pip install coverage pytest --break-system-packages
          python -m pip install --editable . --break-system-packages
      - name: Run help check
        run: .travis/test-all-bin.sh

  import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Enable symlink
        run: sudo ln -sf $(which python3) /usr/bin/python
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --break-system-packages
          python -m pip install -r requirements.txt --break-system-packages
          python -m pip install coverage pytest --break-system-packages
          python -m pip install --editable . --break-system-packages
      - name: Run import check
        run: python .travis/test-all-mod.py

  test-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Enable symlink
        run: sudo ln -sf $(which python3) /usr/bin/python
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --break-system-packages
          python -m pip install -r requirements.txt --break-system-packages
          python -m pip install coverage pytest --break-system-packages
          python -m pip install --editable . --break-system-packages
      - name: Run test scripts
        run: |
          . .travis/test-coord.sh
          . .travis/test-integrate.sh
          . .travis/test-posterior.sh
          bash .travis/test-run.sh
          bash .travis/test-run-alts.sh
          bash .travis/test-build.sh

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: docs/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --break-system-packages
          python -m pip install -r docs/requirements.txt --break-system-packages
      - name: Build docs
        run: |
          cd docs
          make clean
          cd ..
          sphinx-build docs/source/ docs/build/
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/build/
